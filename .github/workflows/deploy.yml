# GitHub Pages'e otomatik yayınlama
# Her main dalına push'ta çalışır: projeyi derler ve Pages'e yükler.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # elle de tetikleyebilmek için

permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek yayın çalışsın
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Derle (GitHub Pages modunda)
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Pages yapılandır
        uses: actions/configure-pages@v5

      - name: dist klasörünü yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Yayınla
        id: deployment
        uses: actions/deploy-pages@v4
